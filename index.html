<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商務引薦自動排版系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- JSZip for batch export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
        }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        /* V1 Layout */
        .industry-text { color: #d32f2f; font-weight: 700; }
        .label-text { color: #666; font-weight: 500; }
        .next-one-text { color: #d32f2f; font-weight: 700; }
        .profile-mask {
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 1/1;
            background-color: #e0e0e0;
        }

        /* V2 Layout */
        .v2-name {
            color: #4b5563; font-weight: 700; font-size: 1.25rem;
            margin-bottom: 0.5rem; text-align: center; line-height: 1.4;
            display: block; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; width: 100%;
        }
        .v2-industry {
            color: #d32f2f; font-weight: 700; font-size: 1rem;
            margin-top: 0.5rem; text-align: center; line-height: 1.4;
            display: block; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; width: 100%;
        }
        .v2-photo-mask {
            width: 100%; aspect-ratio: 1/1; border-radius: 1rem;
            overflow: hidden; background-color: #e0e0e0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Controls */
        #controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.95); color: white; padding: 1.5rem;
            transform: translateY(100%); transition: transform 0.3s ease;
            z-index: 50; border-top: 1px solid #444;
        }
        #controls.visible { transform: translateY(0); }

        #post-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            align-items: center; justify-content: center;
        }
        #post-modal.flex { display: flex; }

        .edit-area {
            width: 100%; background: #2d2d2d; color: #e5e7eb;
            font-family: monospace; padding: 10px; border-radius: 4px;
            font-size: 14px; resize: none;
        }
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%;
            border-top: 3px solid #3498db; width: 16px; height: 16px;
            animation: spin 2s linear infinite; display: inline-block;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        /* Batch export progress */
        #batch-progress {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92); color: white;
            padding: 2rem 3rem; border-radius: 1rem; z-index: 200;
            text-align: center; min-width: 300px;
        }
        .progress-bar-track {
            background: #333; border-radius: 9999px; height: 8px; margin-top: 1rem;
        }
        .progress-bar-fill {
            background: #6366f1; border-radius: 9999px; height: 8px;
            transition: width 0.3s ease; width: 0%;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center relative bg-[#f0f2f5]">

                        下一頁 <i class="fa-solid fa-chevron-right"></i>

    <!-- Post Modal -->
    <div id="post-modal">

    <!-- Batch Progress Overlay -->
    <div id="batch-progress">
        <div class="text-lg font-bold mb-1">批次匯出中...</div>
        <div id="batch-status-text" class="text-sm text-gray-300 mb-2">準備中</div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div id="progress-label" class="text-xs text-gray-400 mt-2">0 / 0</div>
    </div>

    <script>
    // =============================================
    //  DATA
    // =============================================
    let presentationData = [
        {
            "id": "03", "name": "張哲偉", "inviter": "廖傑輝",
            "industry": "百香果產業鏈", "company": "鮮田股份有限公司",
            "coop": "食品廠/行銷通路/戰略投資人/連鎖飲品總部",
            "photo": "https://api.dicebear.com/7.x/avataaars/svg?seed=Zhang&gender=male"
        },
        {
            "id": "04", "name": "陳信裕", "inviter": "陳冠維",
            "industry": "汽車鑰匙皮套", "company": "自行創業",
            "coop": "汽車業務.建設公司",
            "photo": "https://api.dicebear.com/7.x/avataaars/svg?seed=Chen&gender=male"
        }
    ];

    let currentIndex = 0;
    let currentLayout = 'v1';

    // =============================================
    //  INIT
    // =============================================
    window.onload = function() {
        const savedData = localStorage.getItem('presentationData');
        const savedUrl  = localStorage.getItem('googleSheetUrl');
        if (savedUrl) document.getElementById('sheet-url').value = savedUrl;
        if (savedData) presentationData = JSON.parse(savedData);
        renderSlide();
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft')  prevSlide();
        });
    };

    // =============================================
    //  GOOGLE DRIVE PHOTO URL PROCESSING
    //  Strategy: use /thumbnail?id=XXX&sz=w400
    //  This endpoint is public, no auth, no CORS issue
    // =============================================
    function processPhotoUrl(url) {
        if (!url) return "";
        url = url.trim();

        // Extract Drive file ID from various URL formats
        let driveId = null;

        // Format: /file/d/ID/view or /file/d/ID/...
        const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (fileMatch) driveId = fileMatch[1];

        // Format: ?id=ID or &id=ID
        if (!driveId) {
            const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (idMatch) driveId = idMatch[1];
        }

        // Format: /d/ID/ (spreadsheet or drive)
        if (!driveId && url.includes('drive.google.com')) {
            const dMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (dMatch) driveId = dMatch[1];
        }

        if (driveId) {
            // *** KEY FIX: Use /thumbnail endpoint — public, no auth, no CORS ***
            // sz=w400 = width 400px (crisp enough for cards)
            return `https://drive.google.com/thumbnail?id=${driveId}&sz=w400`;
        }

        return url; // Return as-is for non-Drive URLs
    }

    // =============================================
    //  IMAGE → BASE64 (for html2canvas)
    // =============================================
    async function getBase64Image(url) {
        if (!url || url.startsWith('data:')) return null;

        const proxies = [
            (t) => `https://api.allorigins.win/raw?url=${encodeURIComponent(t)}`,
            (t) => `https://corsproxy.io/?${encodeURIComponent(t)}`
        ];

        for (const proxyGen of proxies) {
            try {
                const resp = await fetch(proxyGen(url));
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const blob = await resp.blob();
                return await new Promise((res) => {
                    const reader = new FileReader();
                    reader.onloadend = () => res(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.warn("Image proxy failed:", e);
            }
        }
        return null;
    }

    // =============================================
    //  GOOGLE SHEET FETCH
    // =============================================
    function parseGoogleSheetUrl(url) {
        const idMatch  = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        const id       = idMatch ? idMatch[1] : null;
        const gidMatch = url.match(/[#&?]gid=([0-9]+)/);
        const gid      = gidMatch ? gidMatch[1] : "0";
        return { id, gid };
    }

    async function fetchGoogleSheet() {
        const url = document.getElementById('sheet-url').value.trim();
        const statusEl = document.getElementById('fetch-status');
        const btn = document.getElementById('btn-fetch');
        const { id, gid } = parseGoogleSheetUrl(url);

        if (!id) { alert('無法解析 Google Sheet ID，請確認網址格式。'); return; }
        localStorage.setItem('googleSheetUrl', url);

        btn.innerHTML = '<div class="loader"></div> 載入中...';
        btn.disabled = true;
        statusEl.innerText = '正在連線...';
        statusEl.className = 'text-xs text-yellow-400 h-4 mt-1';

        const googleCsvUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
        const proxies = [
            (t) => `https://api.allorigins.win/raw?url=${encodeURIComponent(t)}`,
            (t) => `https://corsproxy.io/?${encodeURIComponent(t)}`,
            (t) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(t)}`
        ];

        let csvText = null, lastError = null;
        for (const proxyGen of proxies) {
            try {
                const resp = await fetch(proxyGen(googleCsvUrl));
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const text = await resp.text();
                if (text && text.trim().startsWith("<")) throw new Error("Received HTML (proxy blocked)");
                csvText = text;
                break;
            } catch (e) { lastError = e; }
        }

        if (!csvText) {
            statusEl.innerText = '讀取失敗';
            statusEl.className = 'text-xs text-red-400 h-4 mt-1';
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i> 載入 Sheet 資料';
            btn.disabled = false;
            alert(`讀取失敗！\n${lastError?.message}`);
            return;
        }

        try {
            Papa.parse(csvText, {
                header: false,
                complete: function(results) {
                    const rawData = results.data;
                    let headerRowIndex = -1;
                    for (let i = 0; i < Math.min(20, rawData.length); i++) {
                        if (JSON.stringify(rawData[i]).includes("姓名") || JSON.stringify(rawData[i]).includes("Name")) {
                            headerRowIndex = i; break;
                        }
                    }
                    if (headerRowIndex === -1) throw new Error("找不到「姓名」標題列");

                    const headers = rawData[headerRowIndex].map(h => h.trim());
                    const findCol = (kw) => headers.findIndex(h => kw.some(k => h.includes(k)));

                    const colMap = {
                        name:    findCol(["姓名","Name"]),
                        inviter: findCol(["邀請人","Inviter"]),
                        industry:findCol(["產業","Industry","行業"]),
                        company: findCol(["公司","Company"]),
                        coop:    findCol(["合作","Coop","對象"]),
                        photo:   findCol(["照片","Photo","Image","圖片","頭像","圖床","連結","Link","URL","Url"])
                    };
                    if (colMap.name === -1) throw new Error("找不到「姓名」欄位");

                    const newData = [];
                    let idCounter = 1;
                    for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                        const row = rawData[i];
                        if (!row[colMap.name] || !row[colMap.name].trim()) continue;
                        newData.push({
                            id:       String(idCounter).padStart(2,'0'),
                            name:     row[colMap.name],
                            inviter:  colMap.inviter  > -1 ? row[colMap.inviter]  : "",
                            industry: colMap.industry > -1 ? row[colMap.industry] : "",
                            company:  colMap.company  > -1 ? row[colMap.company]  : "",
                            coop:     colMap.coop     > -1 ? row[colMap.coop]     : "",
                            // *** processPhotoUrl handles Drive → thumbnail conversion ***
                            photo:    colMap.photo    > -1 ? processPhotoUrl(row[colMap.photo]) : ""
                        });
                        idCounter++;
                    }

                    if (newData.length === 0) throw new Error("沒有有效資料");

                    presentationData = newData;
                    localStorage.setItem('presentationData', JSON.stringify(presentationData));
                    statusEl.innerText = `成功！${newData.length} 筆資料`;
                    statusEl.className = 'text-xs text-green-400 h-4 mt-1';
                    currentIndex = 0;
                    renderSlide();
                    setTimeout(() => toggleControls(), 1500);
                }
            });
        } catch (err) {
            statusEl.innerText = '解析錯誤';
            statusEl.className = 'text-xs text-red-400 h-4 mt-1';
            alert("資料解析錯誤：" + err.message);
        } finally {
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i> 載入 Sheet 資料';
            btn.disabled = false;
        }
    }

    // =============================================
    //  LAYOUT SWITCHING
    // =============================================
    function switchLayout(layout) {
        currentLayout = layout;
        currentIndex = 0;
        const v1 = document.getElementById('layout-v1');
        const v2 = document.getElementById('layout-v2');
        const b1 = document.getElementById('btn-v1');
        const b2 = document.getElementById('btn-v2');

        if (layout === 'v1') {
            v1.style.display = 'flex';
            v2.style.display = 'none';
            b1.className = b1.className.replace('bg-gray-600','bg-blue-600');
            b2.className = b2.className.replace('bg-blue-600','bg-gray-600');
        } else {
            v1.style.display = 'none';
            v2.style.display = 'flex';
            b1.className = b1.className.replace('bg-blue-600','bg-gray-600');
            b2.className = b2.className.replace('bg-gray-600','bg-blue-600');
        }
        renderSlide();
    }

    // =============================================
    //  RENDER
    // =============================================
    function renderSlide() {
        updateSlideCounter();
        if (currentLayout === 'v1') renderV1();
        else renderV2();
    }

    function updateSlideCounter() {
        const step = currentLayout === 'v1' ? 2 : 7;
        const total = Math.ceil(presentationData.length / step);
        const page  = Math.floor(currentIndex / step) + 1;
        document.getElementById('slide-counter').innerText = `${page} / ${total}`;
    }

    function fallbackSrc(name) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=200&font-size=0.33`;
    }

    function setCardImage(el, data) {
        el.src = (data.photo && data.photo.trim()) ? data.photo : fallbackSrc(data.name);
        el.onerror = function() { this.src = fallbackSrc(data.name); this.onerror = null; };
    }

    function renderV1() {
        const p1 = presentationData[currentIndex];
        const p2 = presentationData[currentIndex + 1];

        if (p1) {
            document.getElementById('idx-0').innerText = p1.id || String(currentIndex+1).padStart(2,'0');
            document.getElementById('name-0').innerText     = p1.name     || "";
            document.getElementById('inviter-0').innerText  = p1.inviter  || "---";
            document.getElementById('industry-0').innerText = p1.industry || "---";
            document.getElementById('company-0').innerText  = p1.company  || "---";
            document.getElementById('coop-0').innerText     = p1.coop     || "---";
            setCardImage(document.getElementById('img-0'), p1);
        }

        const rw = document.getElementById('right-card-wrapper');
        if (p2) {
            rw.classList.remove('invisible'); rw.classList.add('visible');
            document.getElementById('idx-1').innerText = p2.id || String(currentIndex+2).padStart(2,'0');
            document.getElementById('name-1').innerText     = p2.name     || "";
            document.getElementById('inviter-1').innerText  = p2.inviter  || "---";
            document.getElementById('industry-1').innerText = p2.industry || "---";
            document.getElementById('company-1').innerText  = p2.company  || "---";
            document.getElementById('coop-1').innerText     = p2.coop     || "---";
            setCardImage(document.getElementById('img-1'), p2);
        } else {
            rw.classList.add('invisible'); rw.classList.remove('visible');
        }

        const n1 = presentationData[currentIndex + 2];
        const n2 = presentationData[currentIndex + 3];
        let nextText = n1 ? n1.name + (n2 ? " / " + n2.name : "") : "產業分組 / END";
        document.getElementById('next-names').innerText = nextText;
    }

    function renderV2() {
        const container = document.getElementById('v2-container');
        container.innerHTML = '';
        for (let i = 0; i < 7; i++) {
            const idx = currentIndex + i;
            if (idx >= presentationData.length) break;
            const d = presentationData[idx];
            const photoSrc = (d.photo && d.photo.trim()) ? d.photo : fallbackSrc(d.name);
            container.innerHTML += `
                <div class="flex flex-col items-center mb-4 w-full px-1">
                    <div class="v2-name truncate w-full text-center">${d.name}</div>
                    <div class="v2-photo-mask">
                        <img src="${photoSrc}" alt="${d.name}" class="w-full h-full object-cover"
                             onerror="this.src='${fallbackSrc(d.name)}'; this.onerror=null;">
                    </div>
                    <div class="v2-industry truncate w-full text-center">${d.industry}</div>
                </div>`;
        }
    }

    // =============================================
    //  NAVIGATION
    // =============================================
    function nextSlide() {
        const step = currentLayout === 'v1' ? 2 : 7;
        if (currentIndex + step < presentationData.length) { currentIndex += step; renderSlide(); }
    }
    function prevSlide() {
        const step = currentLayout === 'v1' ? 2 : 7;
        if (currentIndex - step >= 0) { currentIndex -= step; renderSlide(); }
        else if (currentIndex > 0)    { currentIndex = 0;     renderSlide(); }
    }

    // =============================================
    //  SINGLE PAGE EXPORT
    // =============================================
    async function exportToPng() {
        const element  = document.getElementById("capture-area");
        const controls = document.getElementById("controls");
        const toggleBtn= document.querySelector("button[onclick='toggleControls()']");
        const counter  = document.getElementById("slide-counter");
        const exportBtn= document.getElementById("btn-export");
        const originalBtnText = exportBtn.innerHTML;

        exportBtn.innerHTML = '<div class="loader"></div> 處理中...';
        exportBtn.disabled = true;
        controls.style.visibility = 'hidden';
        toggleBtn.style.visibility = 'hidden';
        counter.style.visibility  = 'hidden';

        try {
            const canvas = await captureCurrentView(element);
            const link = document.createElement('a');
            link.download = `BNI_${String(currentIndex + 1).padStart(3,'0')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) {
            console.error(e);
            alert("匯出失敗：" + e.message);
        } finally {
            controls.style.visibility = '';
            toggleBtn.style.visibility = '';
            counter.style.visibility  = '';
            exportBtn.innerHTML = originalBtnText;
            exportBtn.disabled = false;
        }
    }

    async function captureCurrentView(element) {
        const images = element.querySelectorAll('img');
        const origSrcs = [];

        // Replace with base64 for html2canvas cross-origin support
        for (const img of images) {
            origSrcs.push(img.src);
            if (img.src && !img.src.startsWith('data:')) {
                const b64 = await getBase64Image(img.src);
                if (b64) img.src = b64;
            }
        }
        await new Promise(r => setTimeout(r, 400));

        const canvas = await html2canvas(element, {
            backgroundColor: "#f0f2f5",
            scale: 2,
            scrollY: -window.scrollY,
            useCORS: true
        });

        // Restore
        images.forEach((img, i) => { img.src = origSrcs[i]; });
        return canvas;
    }

    // =============================================
    //  BATCH EXPORT ALL PAGES → ZIP
    // =============================================
    async function batchExportAll() {
        const element  = document.getElementById("capture-area");
        const controls = document.getElementById("controls");
        const toggleBtn= document.querySelector("button[onclick='toggleControls()']");
        const counter  = document.getElementById("slide-counter");
        const progressOverlay = document.getElementById("batch-progress");
        const statusText      = document.getElementById("batch-status-text");
        const progressFill    = document.getElementById("progress-fill");
        const progressLabel   = document.getElementById("progress-label");
        const batchBtn = document.getElementById("btn-batch");

        const step = currentLayout === 'v1' ? 2 : 7;
        const savedIndex = currentIndex;
        const totalPages = Math.ceil(presentationData.length / step);

        controls.style.visibility = 'hidden';
        toggleBtn.style.visibility = 'hidden';
        counter.style.visibility  = 'hidden';
        progressOverlay.style.display = 'block';
        batchBtn.disabled = true;

        const zip = new JSZip();

        try {
            for (let page = 0; page < totalPages; page++) {
                currentIndex = page * step;
                renderSlide();
                await new Promise(r => setTimeout(r, 300)); // wait for DOM update

                statusText.innerText = `正在匯出第 ${page + 1} 頁...`;
                progressFill.style.width = `${Math.round(((page) / totalPages) * 100)}%`;
                progressLabel.innerText = `${page} / ${totalPages}`;

                const canvas = await captureCurrentView(element);
                const dataUrl = canvas.toDataURL('image/png');
                const base64  = dataUrl.split(',')[1];
                const prefix  = currentLayout === 'v1'
                    ? `Page_${String(page+1).padStart(2,'0')}`
                    : `Overview_${String(page+1).padStart(2,'0')}`;
                zip.file(`${prefix}.png`, base64, { base64: true });
            }

            progressFill.style.width = '100%';
            progressLabel.innerText = `${totalPages} / ${totalPages}`;
            statusText.innerText = '打包中，請稍候...';

            const blob = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.download = `BNI_Slides_${currentLayout.toUpperCase()}.zip`;
            link.href = URL.createObjectURL(blob);
            link.click();

        } catch(e) {
            console.error(e);
            alert("批次匯出失敗：" + e.message);
        } finally {
            // Restore
            currentIndex = savedIndex;
            renderSlide();
            controls.style.visibility = '';
            toggleBtn.style.visibility = '';
            counter.style.visibility  = '';
            progressOverlay.style.display = 'none';
            batchBtn.disabled = false;
        }
    }

    // =============================================
    //  LINE POST MODAL
    // =============================================
    function generatePostText() {
        return presentationData.map(p =>
            `👨 ${p.name}｜${p.company} 👀\n` +
            `產業別：${p.industry} 💡\n` +
            `合作對象：${p.coop} 📍\n` +
            `邀請人：${p.inviter}\n` +
            `--------------------------------`
        ).join('\n');
    }

    function openPostModal() {
        document.getElementById('post-output').value = generatePostText();
        document.getElementById('post-modal').classList.add('flex');
        if (document.getElementById('controls').classList.contains('visible')) toggleControls();
    }
    function closePostModal() {
        document.getElementById('post-modal').classList.remove('flex');
    }
    function copyPostText() {
        const ta = document.getElementById('post-output');
        ta.select();
        document.execCommand('copy');
        alert("已複製到剪貼簿！");
    }

    function toggleControls() {
        document.getElementById('controls').classList.toggle('visible');
    }
    </script>
</body>
